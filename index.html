<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Void Drinks</title>
    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Titan+One&display=swap" rel="stylesheet">
</head>
<body>
    <header class="site-header">
        <a class="nav-buttonHome" href="#">HOME</a>
        <h1 class="logo-text">VOID</h1>
        <a class="nav-buttonOrder" href="#">ORDER</a>
    </header>

    <main>
        <div class="container">
            <img class="hero-image" src="images/Adobe Express - file.png" alt="VOLT energy drink">
            <svg class="tagline-svg" viewBox="0 0 600 100" width="600" height="100">
                <path id="tagline-curve" d="M 20,20 Q 300,90 580,20" fill="transparent" />
                <text>
                    <textPath href="#tagline-curve" startOffset="50%" text-anchor="middle">
                        <tspan fill="#f2ed48">Sunshine in every sip. </tspan>
                        <tspan fill="#5b2a9e">Storm in every sec.</tspan>
                    </textPath>
                </text>
            </svg>
            <svg class="text" viewBox="0 0 600 100" width="600" height="100">
                <path id="tagline-curve2" d="M 20,20 Q 300,90 580,20" fill="transparent" />
                <text fill="#098fe1">
                    <textPath href="#tagline-curve2" startOffset="50%" text-anchor="middle">
                        Zero Sugar. Max Chaos.
                    </textPath>
                </text>
            </svg>
        </div>
    </main>

    <footer>
        <div>
            <div class="footBox">
                <a class="footText"href="#">MULTIPLE FLAVOURS</a>
            </div>
        </div>
    </footer>
</body>

</html>
