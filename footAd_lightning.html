<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JOIN THE STORM — lightning effect</title>
<style>
  :root{
    --orange: #FDAE1E;
    --orange-dark: #E0910A;
    --blue: #1E86E0;
    --blue-dark: #0F5FA8;
    --purple: #6A3FD6;
    --purple-light: #B9A6FF;
    --white: #F4FBFF;
  }

  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background: #7EC3EA;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  /* ================= .footAd ================= */
  .footAd{
    position:relative;
    width: 340px;
    height: 220px;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .footAd canvas{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    pointer-events:none;
  }

  /* ambient storm-cloud glow that breathes behind the button at all times */
  .footAd .stormGlow{
    position:absolute;
    left:50%; top:50%;
    width: 260px; height: 140px;
    transform: translate(-50%,-50%);
    background: radial-gradient(ellipse at center, rgba(106,63,214,.35), rgba(106,63,214,0) 70%);
    filter: blur(6px);
    animation: glow-breathe 3.4s ease-in-out infinite;
    pointer-events:none;
  }

  @keyframes glow-breathe{
    0%,100%{ opacity:.5; transform: translate(-50%,-50%) scale(1); }
    50%{ opacity:.85; transform: translate(-50%,-50%) scale(1.08); }
  }

  .footAd.is-hot .stormGlow{
    animation-duration: 1s;
    background: radial-gradient(ellipse at center, rgba(185,166,255,.55), rgba(106,63,214,0) 72%);
  }

  /* ============ the actual button ============ */
  .storm-btn{
    position:relative;
    z-index:2;
    display:inline-block;
    padding: 16px 34px;
    border-radius: 999px;
    background: linear-gradient(180deg, var(--orange), var(--orange-dark));
    color: var(--blue-dark);
    text-decoration:none;
    font-weight: 800;
    font-size: 1.15rem;
    letter-spacing:.03em;
    text-transform:uppercase;
    -webkit-text-stroke: 1px var(--blue);
    box-shadow:
      0 4px 0 var(--orange-dark),
      0 6px 14px rgba(0,0,0,.25);
    transition: transform .12s ease, box-shadow .2s ease, filter .15s ease;
  }

  .storm-btn:active{ transform: translateY(2px); box-shadow: 0 2px 0 var(--orange-dark); }

  /* base flicker: button is always *slightly* alive with current */
  .footAd .storm-btn{
    animation: btn-idle-flicker 2.6s ease-in-out infinite;
  }
  @keyframes btn-idle-flicker{
    0%,100%{ filter: brightness(1) drop-shadow(0 0 0 rgba(185,166,255,0)); }
    46%{ filter: brightness(1); }
    48%{ filter: brightness(1.25) drop-shadow(0 0 10px rgba(200,220,255,.9)); }
    50%{ filter: brightness(1); }
  }

  /* intensified state while hovering */
  .footAd.is-hot .storm-btn{
    animation: btn-hot-flicker .5s ease-in-out infinite;
    box-shadow:
      0 4px 0 var(--orange-dark),
      0 0 18px 4px rgba(185,166,255,.85),
      0 0 40px 10px rgba(106,63,214,.55);
  }
  @keyframes btn-hot-flicker{
    0%,100%{ filter: brightness(1.15); }
    50%{ filter: brightness(1.5) drop-shadow(0 0 14px rgba(230,240,255,1)); }
  }
</style>
</head>
<body>

  <div class="footAd" id="footAd">
    <div class="stormGlow"></div>
    <canvas id="boltCanvas"></canvas>
    <a href="#" class="storm-btn">Join the Storm</a>
  </div>

<script>
(function(){
  const wrap   = document.getElementById('footAd');
  const link   = wrap.querySelector('a');
  const canvas = document.getElementById('boltCanvas');
  const ctx    = canvas.getContext('2d');

  let W, H, DPR;
  function resize(){
    DPR = window.devicePixelRatio || 1;
    W = wrap.clientWidth;
    H = wrap.clientHeight;
    canvas.width  = W * DPR;
    canvas.height = H * DPR;
    ctx.setTransform(DPR,0,0,DPR,0,0);
  }
  resize();
  window.addEventListener('resize', resize);

  // ---------- procedural jagged bolt (midpoint displacement) ----------
  function buildBolt(x1,y1,x2,y2, displace, detailPasses, points){
    points = points || [[x1,y1],[x2,y2]];
    for (let p = 0; p < detailPasses; p++){
      const next = [points[0]];
      for (let i = 0; i < points.length - 1; i++){
        const [ax,ay] = points[i];
        const [bx,by] = points[i+1];
        const mx = (ax+bx)/2;
        const my = (ay+by)/2;
        const dx = bx-ax, dy = by-ay;
        const len = Math.hypot(dx,dy) || 1;
        const nx = -dy/len, ny = dx/len;
        const off = (Math.random()*2-1) * displace;
        next.push([mx + nx*off, my + ny*off]);
        next.push([bx,by]);
      }
      points = next;
      displace *= 0.55;
    }
    return points;
  }

  function branchesFrom(points, chance, maxLen){
    const branches = [];
    for (let i = 2; i < points.length - 2; i++){
      if (Math.random() < chance){
        const [ax,ay] = points[i];
        const [bx,by] = points[i+1];
        const dx = bx-ax, dy = by-ay;
        const angle = Math.atan2(dy,dx) + (Math.random()*1.2 - 0.6) + (Math.random()<0.5?-0.6:0.6);
        const len = maxLen * (0.4 + Math.random()*0.6);
        const ex = ax + Math.cos(angle)*len;
        const ey = ay + Math.sin(angle)*len;
        branches.push(buildBolt(ax,ay,ex,ey, len*0.35, 3));
      }
    }
    return branches;
  }

  function strokePath(pts, width, color, glow){
    ctx.beginPath();
    ctx.moveTo(pts[0][0], pts[0][1]);
    for (let i=1;i<pts.length;i++) ctx.lineTo(pts[i][0], pts[i][1]);
    ctx.lineJoin = 'round';
    ctx.lineCap = 'round';
    ctx.shadowColor = glow;
    ctx.shadowBlur = width * 6;
    ctx.strokeStyle = color;
    ctx.lineWidth = width;
    ctx.stroke();
  }

  // ---------- active bolt lifecycle ----------
  let bolts = [];
  let hot = false;

  function spawnBolt(opts){
    opts = opts || {};
    const fromTop = Math.random() < 0.7;
    let x1,y1,x2,y2;
    const cx = W/2, cy = H/2;
    if (fromTop){
      x1 = cx + (Math.random()*160-80);
      y1 = -10;
      x2 = cx + (Math.random()*60-30);
      y2 = cy + (Math.random()*20-10);
    } else {
      const fromLeft = Math.random() < 0.5;
      x1 = fromLeft ? -10 : W+10;
      y1 = cy + (Math.random()*80-40);
      x2 = cx + (Math.random()*40-20);
      y2 = cy + (Math.random()*20-10);
    }
    const displace = opts.displace || (hot ? 34 : 20);
    const main = buildBolt(x1,y1,x2,y2, displace, 4);
    const branchChance = opts.branchChance != null ? opts.branchChance : (hot ? 0.16 : 0.08);
    const branches = branchesFrom(main, branchChance, 40 + (hot?30:0));
    bolts.push({
      main, branches,
      born: performance.now(),
      life: opts.life || (hot ? 220 + Math.random()*120 : 140 + Math.random()*90),
      core: opts.core || (hot ? '#FFFFFF' : '#EAF6FF'),
      glow: opts.glow || (hot ? '#C9B6FF' : '#7B4FE0')
    });
    flashButton();
  }

  function flashButton(){
    link.style.filter = 'brightness(1.6) drop-shadow(0 0 16px rgba(230,240,255,1))';
    setTimeout(()=>{ link.style.filter = ''; }, 90);
  }

  function draw(now){
    ctx.clearRect(0,0,W,H);
    bolts = bolts.filter(b => now - b.born < b.life);

    for (const b of bolts){
      const t = (now - b.born) / b.life;
      const alpha = t < 0.15 ? (t/0.15) : Math.max(0, 1 - (t-0.15)/0.85);
      ctx.globalAlpha = alpha;

      strokePath(b.main, hot ? 5 : 3.2, b.glow, b.glow);
      strokePath(b.main, hot ? 2 : 1.4, b.core, b.core);

      for (const br of b.branches){
        ctx.globalAlpha = alpha * 0.75;
        strokePath(br, hot ? 2.6 : 1.8, b.glow, b.glow);
        strokePath(br, hot ? 1.2 : 0.9, b.core, b.core);
      }
    }
    ctx.globalAlpha = 1;
    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);

  // ---------- idle: bolt occasionally, always "slightly working" ----------
  function scheduleIdle(){
    const delay = 1400 + Math.random()*2200;
    setTimeout(()=>{
      if (!hot) spawnBolt({});
      scheduleIdle();
    }, delay);
  }
  scheduleIdle();

  // ---------- hover: intensify ----------
  let hotInterval = null;
  link.addEventListener('mouseenter', () => {
    hot = true;
    wrap.classList.add('is-hot');
    spawnBolt({});
    hotInterval = setInterval(() => spawnBolt({}), 130);
  });
  link.addEventListener('mouseleave', () => {
    hot = false;
    wrap.classList.remove('is-hot');
    clearInterval(hotInterval);
  });
  link.addEventListener('touchstart', () => link.dispatchEvent(new Event('mouseenter')));
  link.addEventListener('touchend', () => link.dispatchEvent(new Event('mouseleave')));
})();
</script>

</body>
</html>
